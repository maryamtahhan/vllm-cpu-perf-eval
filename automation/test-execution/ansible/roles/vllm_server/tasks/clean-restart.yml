---
# Clean Restart of vLLM Container
# Ensures fresh state between tests for accurate results
# Stops ALL vLLM containers (audio, LLM, embedding) to prevent conflicts

- name: Verify container runtime is podman
  ansible.builtin.fail:
    msg: "Clean restart is only supported for Podman. Current engine: {{ container_runtime.engine }}"
  when: container_runtime.engine != 'podman'

- name: Find all existing vLLM containers (any type)
  ansible.builtin.command:
    cmd: podman ps -a --filter "name=vllm-" --format "{{ '{{' }}.Names{{ '}}' }}"
  register: existing_vllm_containers
  changed_when: false
  failed_when: false

- name: Stop and remove all existing vLLM containers
  containers.podman.podman_container:
    name: "{{ item }}"
    state: absent
  loop: "{{ existing_vllm_containers.stdout_lines }}"
  when: existing_vllm_containers.stdout_lines | length > 0
  ignore_errors: true
  register: cleanup_result

- name: Wait for cleanup to complete
  ansible.builtin.pause:
    seconds: 5
    prompt: "Waiting for vLLM cleanup..."
  when: existing_vllm_containers.stdout_lines | length > 0

- name: Display cleanup status
  ansible.builtin.debug:
    msg: "✓ Cleaned {{ existing_vllm_containers.stdout_lines | length }} vLLM container(s): {{ existing_vllm_containers.stdout_lines | join(', ') }}"
  when: existing_vllm_containers.stdout_lines | length > 0
