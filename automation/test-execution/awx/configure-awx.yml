---
# Automated AWX Configuration for vLLM Performance Testing
# This playbook configures AWX with projects, inventories, credentials, and job templates
#
# Usage:
#   export CONTROLLER_HOST=http://localhost:30080  # or :8052 for docker-compose
#   export CONTROLLER_USERNAME=admin
#   export CONTROLLER_PASSWORD=password
#   ansible-playbook configure-awx.yml

- name: Configure AWX for vLLM Performance Testing
  hosts: localhost
  gather_facts: false
  vars:
    # AWX connection settings
    controller_host: "{{ lookup('env', 'CONTROLLER_HOST') | default('http://localhost:30080', true) }}"
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') | default('password', true) }}"
    validate_certs: false

    # Project settings
    project_name: "vLLM CPU Perf Eval"
    project_scm_url: "https://github.com/maryamtahhan/vllm-cpu-perf-eval.git"
    project_scm_branch: "awx-integration"

    # Inventory settings (customize these for your environment)
    inventory_name: "vLLM Test Infrastructure"
    dut_hostname: "{{ lookup('env', 'DUT_HOSTNAME') | default('192.168.1.10', true) }}"
    dut_username: "{{ lookup('env', 'DUT_USERNAME') | default('ec2-user', true) }}"
    loadgen_is_local: "{{ lookup('env', 'LOADGEN_LOCAL') | default('true', true) | bool }}"

    # SSH key path (for DUT access)
    ssh_key_path: "{{ lookup('env', 'SSH_KEY_PATH') | default('~/.ssh/id_rsa', true) }}"

  tasks:
    - name: Display configuration summary
      ansible.builtin.debug:
        msg:
          - "Configuring AWX at {{ controller_host }}"
          - "Project: {{ project_name }}"
          - "SCM URL: {{ project_scm_url }}"
          - "Branch: {{ project_scm_branch }}"
          - "DUT: {{ dut_hostname }} (user: {{ dut_username }})"
          - "Load Generator: {{ 'Local (AWX host)' if loadgen_is_local else 'Remote' }}"

    - name: Create vLLM Performance Testing Project
      awx.awx.project:
        name: "{{ project_name }}"
        organization: "Default"
        scm_type: git
        scm_url: "{{ project_scm_url }}"
        scm_branch: "{{ project_scm_branch }}"
        scm_update_on_launch: true
        scm_update_cache_timeout: 0
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Sync project to fetch latest code
      awx.awx.project_update:
        name: "{{ project_name }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        wait: true

    - name: Create vLLM Test Infrastructure Inventory
      awx.awx.inventory:
        name: "{{ inventory_name }}"
        organization: "Default"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Create 'dut' inventory group
      awx.awx.group:
        name: dut
        inventory: "{{ inventory_name }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Create 'load_generator' inventory group
      awx.awx.group:
        name: load_generator
        inventory: "{{ inventory_name }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Add DUT host to inventory
      awx.awx.host:
        name: dut-host
        inventory: "{{ inventory_name }}"
        variables:
          ansible_host: "{{ dut_hostname }}"
          ansible_user: "{{ dut_username }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Add DUT host to 'dut' group
      awx.awx.group:
        name: dut
        inventory: "{{ inventory_name }}"
        hosts:
          - dut-host
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Add Load Generator host to inventory
      awx.awx.host:
        name: loadgen-host
        inventory: "{{ inventory_name }}"
        variables:
          ansible_host: "{{ 'localhost' if loadgen_is_local else lookup('env', 'LOADGEN_HOSTNAME') }}"
          ansible_connection: "{{ 'local' if loadgen_is_local else 'ssh' }}"
          bench_config:
            vllm_host: "{{ dut_hostname }}"
            vllm_port: 8000
            results_dir: "/tmp/benchmark-results"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Add Load Generator host to 'load_generator' group
      awx.awx.group:
        name: load_generator
        inventory: "{{ inventory_name }}"
        hosts:
          - loadgen-host
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Check if SSH key file exists
      ansible.builtin.stat:
        path: "{{ ssh_key_path | expanduser }}"
      register: ssh_key_file

    - name: Read SSH private key
      ansible.builtin.slurp:
        src: "{{ ssh_key_path | expanduser }}"
      register: ssh_key_content
      when: ssh_key_file.stat.exists

    - name: Create DUT SSH Credential
      awx.awx.credential:
        name: "DUT SSH Key"
        organization: "Default"
        credential_type: "Machine"
        inputs:
          username: "{{ dut_username }}"
          ssh_key_data: "{{ ssh_key_content['content'] | b64decode }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present
      when: ssh_key_file.stat.exists

    - name: Warn if SSH key not found
      ansible.builtin.debug:
        msg: "WARNING: SSH key not found at {{ ssh_key_path }}. You'll need to add credentials manually."
      when: not ssh_key_file.stat.exists

    - name: Create HuggingFace Token Credential Type
      awx.awx.credential_type:
        name: "HuggingFace Token"
        kind: cloud
        inputs:
          fields:
            - id: hf_token
              type: string
              label: "HuggingFace API Token"
              secret: true
          required:
            - hf_token
        injectors:
          env:
            HF_TOKEN: "{{ '{{ hf_token }}' }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Create LLM GuideLLM Performance Test Job Template
      awx.awx.job_template:
        name: "LLM GuideLLM Performance Test"
        job_type: "run"
        organization: "Default"
        inventory: "{{ inventory_name }}"
        project: "{{ project_name }}"
        playbook: "automation/test-execution/ansible/playbooks/llm/run-guidellm-test.yml"
        credentials:
          - "DUT SSH Key"
        verbosity: 1
        ask_credential_on_launch: true
        ask_variables_on_launch: true
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Create Embedding Model Performance Test Job Template
      awx.awx.job_template:
        name: "Embedding Model Performance Test"
        job_type: "run"
        organization: "Default"
        inventory: "{{ inventory_name }}"
        project: "{{ project_name }}"
        playbook: "automation/test-execution/ansible/playbooks/embedding/run-tests.yml"
        credentials:
          - "DUT SSH Key"
        verbosity: 1
        ask_credential_on_launch: true
        ask_variables_on_launch: true
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Configuration complete
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "✓ AWX Configuration Complete!"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - ""
          - "Access AWX: {{ controller_host }}"
          - "Login: {{ controller_username }} / {{ controller_password }}"
          - ""
          - "Configured:"
          - "  ✓ Project: {{ project_name }}"
          - "  ✓ Inventory: {{ inventory_name }}"
          - "  ✓ Credentials: DUT SSH Key"
          - "  ✓ Credential Type: HuggingFace Token"
          - "  ✓ Job Template: LLM GuideLLM Performance Test"
          - "  ✓ Job Template: Embedding Model Performance Test"
          - ""
          - "Next steps:"
          - "  1. (Optional) Add HuggingFace token credential for gated models"
          - "  2. Launch a test job from AWX UI"
          - "  3. View results in /tmp/benchmark-results/"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
